<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Admin | Levy Media Studios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Favicon / Icon -->
  <link rel="icon" type="image/jpeg" href="/assets/img/levy-icon.jpg" />
  <link rel="apple-touch-icon" href="/assets/img/levy-icon.jpg" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#000000" />

  <!-- OpenGraph -->
  <meta property="og:title" content="Admin | Levy Media Studios" />
  <meta property="og:description" content="Edit and update the Levy Media Studios website content." />
  <meta property="og:image" content="/assets/img/levy-icon.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://levymediastudios.com/admin/" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Admin | Levy Media Studios" />
  <meta name="twitter:description" content="Edit and update the Levy Media Studios website content." />
  <meta name="twitter:image" content="/assets/img/levy-icon.jpg" />

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/styles.css" />

  <style>
    body {
      background: url('/assets/img/levy-icon.jpg') center center / cover no-repeat fixed;
      backdrop-filter: blur(4px);
    }

    #admin-page {
      background: rgba(0,0,0,0.75);
      padding: 30px;
      border-radius: 12px;
      max-width: 900px;
      margin: 60px auto;
      color: #fff;
    }

    header.site-header {
      background: rgba(0,0,0,0.85);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    header .logo img {
      height: 50px;
      width: auto;
    }

    textarea#json-editor {
      width: 100%;
      height: 500px;
      background: #111;
      color: #0f0;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }

    .btn.primary {
      background: #1e90ff;
      color: #fff;
    }

    .btn.red {
      background: #ff4444;
      color: #fff;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="logo">
    <img src="/assets/img/levy-logo.jpg" alt="Levy Media Studios Logo" />
  </div>

  <nav class="main-nav">
    <a href="/index.html">Home</a>
    <a href="/about.html">About</a>
    <a href="/projects.html">Projects</a>
    <a href="/preorder.html">Pre Order</a>
    <a href="/contact.html">Contact</a>
  </nav>
</header>

<main id="admin-page">
  <h1>Site Editor</h1>

  <p style="color:#ccc; margin-bottom:20px;">
    Edit the entire website content below.<br>
    When finished, click <strong>Save to Website</strong> to update the live site.
  </p>

  <textarea id="json-editor"></textarea>

  <div style="margin-top:20px;">
    <button id="save-json" class="btn primary">Download Backup</button>
    <button id="push-json" class="btn red">Save to Website</button>
  </div>
</main>

<footer class="site-footer" style="text-align:center; color:#fff; margin-top:40px;">
  <p>© <span id="year"></span> Levy Media Studios</p>
</footer>

<script src="/assets/js/admin.js"></script>
</body>
</html>
